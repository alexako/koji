[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
lib_deps = 
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^6.21.0

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=-1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000

[env:esp32s3]
; ESP32-S3 DevKitC configuration (generic)
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
board_build.arduino.memory_type = qio_opi
lib_deps = 
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^6.21.0

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_BL=-1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    ; Enable PSRAM for sprite buffer
    -DBOARD_HAS_PSRAM
    -DUSE_DOUBLE_BUFFER=1

[env:xiao_esp32s3]
; Seeed XIAO ESP32-S3 configuration
; Pinout: https://wiki.seeedstudio.com/xiao_esp32s3_getting_started/
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
; XIAO uses native USB - usually shows up as /dev/ttyACM0
upload_port = /dev/ttyACM0
board_build.arduino.memory_type = qio_opi
lib_deps = 
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^6.21.0

build_flags = 
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=8
    -DTFT_SCLK=7
    -DTFT_CS=3
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=-1
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=16000000
    ; Use HSPI for ESP32-S3 (SPI2)
    -DUSE_HSPI_PORT=1
    ; Enable PSRAM for sprite buffer (XIAO S3 has 8MB PSRAM)
    -DBOARD_HAS_PSRAM
    -DUSE_DOUBLE_BUFFER=1
